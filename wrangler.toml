# Cloudflare Worker config (Workers + Static Assets model).
#
# - main: the Worker that handles /api/* (worker.ts)
# - [assets]: the React build in dist/ is served as static files, with SPA
#   fallback to index.html for client-side routes. `run_worker_first` forces
#   /api/* to the Worker even on direct navigation.
# - [[d1_databases]]: binds the D1 database as env.DB at deploy time, so no
#   manual dashboard binding is needed.
#
# The VERDICT_PASSWORD secret is NOT here (secrets don't belong in source).
# Set it in the dashboard: Worker -> Settings -> Variables and Secrets, or with
#   npx wrangler secret put VERDICT_PASSWORD

name = "margin-of-error"
main = "worker.ts"
compatibility_date = "2025-05-01"
account_id = "b6bbf563bb333c202cb99dca976a0cbe"

[assets]
directory = "./dist/"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "margin-of-error-db"
database_id = "b1771055-8bc9-4a97-bfab-e454ad524a01"
